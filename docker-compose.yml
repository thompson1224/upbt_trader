services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: upbit_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d upbit_trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    command: uvicorn apps.gateway.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${GATEWAY_HOST_PORT:-8001}:8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  market_data:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: market_data_service
    command: python -m apps.market_data_service.main
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  strategy:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: strategy_service
    command: python -m apps.strategy_service.main
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  execution:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: execution_service
    command: python -m apps.execution_service.main
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  risk:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: risk_service
    command: python -m apps.risk_service.main
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  backtest:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: backtest_service
    command: python -m apps.backtest_service.main
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_HOST_PORT:-8001}
        NEXT_PUBLIC_WS_URL: ws://localhost:${GATEWAY_HOST_PORT:-8001}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_HOST_PORT:-8001}
      NEXT_PUBLIC_WS_URL: ws://localhost:${GATEWAY_HOST_PORT:-8001}
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
